server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Asegura que .jsx se sirva como JavaScript (Babel lo compila en cliente)
    types {
        text/html                             html htm;
        text/css                              css;
        application/javascript                js mjs;
        application/javascript                jsx;
        image/svg+xml                         svg svgz;
        image/png                             png;
        image/jpeg                            jpg jpeg;
        image/webp                            webp;
        font/woff                             woff;
        font/woff2                            woff2;
        application/json                      json;
    }

    # Cache largo para assets estáticos
    location ~* \.(?:css|js|jsx|svg|png|jpg|jpeg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # SPA-friendly fallback (aunque aquí es un solo archivo, no estorba)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Compresión
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
